<div class="container col-sm-8 col-md-6 col-lg-4">

    <form class="row g-1" [formGroup]="loginForm" (ngSubmit)="onSubmit()" method="post">
        <!-- https://pixabay.com/vectors/vinyl-platinum-disk-music-dj-2241789/ -->
        <img class="mb-4" src="https://cdn.pixabay.com/photo/2017/04/19/10/24/vinyl-2241789_1280.png" alt="" width="72" height="57">

        <h1 class="h3 mb-3 fw-normal">Please sign in</h1>

        <div class="form-floating">
            <input
                type="email"
                id="email"
                class="form-control"
                [class.is-valid]="emailControl?.valid"
                [class.is-invalid]="isEmailInvalid"
                placeholder="name@example.com"
                formControlName="email">
            <label for="email">Email address</label>

            @if(isEmailInvalid) {
            <small class="input-danger text-danger">
                {{ emailErrorMessage }}
            </small>
            }
        </div>

        <div class="form-floating">
            <input
                type="password"
                id="password"
                class="form-control"
                [class.is-valid]="passwordControl?.valid"
                [class.is-invalid]="isPasswordInvalid"
                placeholder="Password"
                formControlName="password">
            <label for="password">Password</label>

            @if(isPasswordInvalid) {
            <small class="input-danger text-danger">
                {{ passwordErrorMessage }}
            </small>
            }
        </div>

        <div class="form-check text-start my-3">
            <input class="form-check-input" type="checkbox" value="remember-me" id="checkDefault">
            <label class="form-check-label" for="checkDefault">Remember me</label>
        </div>

        <button class="btn btn-primary w-100 py-2" type="submit" [disabled]="loginForm.invalid">Login</button>

        <p class="mt-5 mb-3 text-body-secondary">©Copyright; 2026</p>
    </form>

</div>
